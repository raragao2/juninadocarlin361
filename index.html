<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arraial Concilia Sync - Controle de Fichas e Estoque</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config para cores personalizadas -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'ui-serif', 'serif'],
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #fffbeb;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #f97316;
      border-radius: 10px;
    }
  </style>
</head>
<body class="min-h-screen bg-orange-50 text-slate-800 font-sans pb-16">

  <div id="app">
    <!-- Tela de carregamento rápido -->
    <div class="flex flex-col items-center justify-center min-h-screen bg-orange-50 p-4">
      <div class="text-center">
        <span class="text-6xl animate-bounce block mb-4">🔥</span>
        <h2 class="text-2xl font-black text-orange-600">Carregando o Arraial...</h2>
        <p class="text-sm text-slate-500 mt-2">Preparando as barracas e fogueira.</p>
      </div>
    </div>
  </div>

  <script type="module">
    // Importações opcionais do Firebase para quando o usuário decidir ativar o sincronismo
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Credenciais vazias por padrão (O sistema usará o armazenamento local automaticamente se estiver vazio)
    const firebaseConfig = {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };

    // Identifica se temos o Firebase ativo para conectar as pessoas em tempo real
    const isFirebaseActive = !!(firebaseConfig.apiKey && firebaseConfig.apiKey !== "");

    let db = null;
    let auth = null;
    const appId = "festa-junina-baixas";

    // ESTADO GLOBAL DO APLICATIVO
    const state = {
      user: null,
      operatorRole: localStorage.getItem('junina_role') || 'BARRACA',
      sellerName: localStorage.getItem('junina_seller_name') || '',
      isSettingName: !localStorage.getItem('junina_seller_name'),
      tempSellerName: localStorage.getItem('junina_seller_name') || '',
      tempRole: localStorage.getItem('junina_role') || 'BARRACA',
      items: [],
      transactions: [],
      activeTab: localStorage.getItem('junina_role') === 'CAIXA' ? 'vender_fichas' : 'entregar_produtos',
      alertMessage: null,
      isSyncing: false,
      confirmDeleteData: null,
      paymentMethod: 'Dinheiro',
      // Modos de Configuração do Firebase pelo Painel
      firebaseApiKey: localStorage.getItem('fb_apiKey') || '',
      firebaseProjectId: localStorage.getItem('fb_projectId') || '',
      firebaseAppId: localStorage.getItem('fb_appId') || ''
    };

    
    // Fallback de dados iniciais padrão para a festa ficar bonita de cara se não houver dados salvos
    const defaultItems = [
      { id: "1", name: "Salsichão", price: 5.00, stock: 50, category: "Comida" },
      { id: "2", name: "Pastel", price: 5.00, stock: 40, category: "Comida" },
      { id: "3", name: "Pipoca", price: 5.00, stock: 100, category: "Comida" },
      { id: "4", name: "Refrigerante", price: 5.00, stock: 60, category: "Bebida" },
      { id: "5", name: "Água com Gás", price: 7.50, stock: 30, category: "Bebida" }
    ];

    // Carrega dados iniciais do LocalStorage ou do Mock
    if (!localStorage.getItem('local_items')) {
      localStorage.setItem('local_items', JSON.stringify(defaultItems));
    }
    if (!localStorage.getItem('local_transactions')) {
      localStorage.setItem('local_transactions', JSON.stringify([]));
    }

    // Gerenciador de Banco de Dados Híbrido (Local ou Firebase)
    const database = {
      async getItems() {
        if (isFirebaseActive && db) {
          // Obtido via OnSnapshot em tempo real
          return state.items;
        } else {
          return JSON.parse(localStorage.getItem('local_items') || '[]');
        }
      },
      async saveItem(item) {
        if (isFirebaseActive && db) {
          const itemsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'items');
          await setDoc(doc(itemsColRef, item.id || crypto.randomUUID()), {
            name: item.name,
            price: item.price,
            stock: item.stock,
            category: item.category,
            createdAt: serverTimestamp()
          });
        } else {
          const localItems = JSON.parse(localStorage.getItem('local_items') || '[]');
          const existsIndex = localItems.findIndex(i => i.id === item.id);
          if (existsIndex > -1) {
            localItems[existsIndex] = item;
          } else {
            item.id = crypto.randomUUID();
            localItems.push(item);
          }
          localStorage.setItem('local_items', JSON.stringify(localItems));
          state.items = localItems;
          render();
        }
      },
      async updateStock(itemId, newStock) {
        if (isFirebaseActive && db) {
          const itemDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', itemId);
          await updateDoc(itemDocRef, { stock: parseInt(newStock) });
        } else {
          const localItems = JSON.parse(localStorage.getItem('local_items') || '[]');
          const item = localItems.find(i => i.id === itemId);
          if (item) {
            item.stock = parseInt(newStock);
            localStorage.setItem('local_items', JSON.stringify(localItems));
            state.items = localItems;
            render();
          }
        }
      },
      async deleteItem(itemId) {
        if (isFirebaseActive && db) {
          const itemDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', itemId);
          await deleteDoc(itemDocRef);
        } else {
          const localItems = JSON.parse(localStorage.getItem('local_items') || '[]');
          const filtered = localItems.filter(i => i.id !== itemId);
          localStorage.setItem('local_items', JSON.stringify(filtered));
          state.items = filtered;
          render();
        }
      },
      async addTransaction(tx) {
        if (isFirebaseActive && db) {
          const transColRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
          await addDoc(transColRef, {
            ...tx,
            timestamp: serverTimestamp()
          });
        } else {
          const localTx = JSON.parse(localStorage.getItem('local_transactions') || '[]');
          tx.id = crypto.randomUUID();
          tx.timestamp = { seconds: Math.floor(Date.now() / 1000) };
          localTx.unshift(tx);
          localStorage.setItem('local_transactions', JSON.stringify(localTx));
          state.transactions = localTx;
          render();
        }
      }
    };

    window.showAlert = function(text, type = 'info') {
      state.alertMessage = { text, type };
      render();
      setTimeout(() => {
        state.alertMessage = null;
        render();
      }, 4000);
    };

    // Tenta conectar ao Firebase caso configurado
    if (isFirebaseActive) {
      try {
        const fbApp = initializeApp(firebaseConfig);
        auth = getAuth(fbApp);
        db = getFirestore(fbApp);
        
        state.isSyncing = true;
        
        signInAnonymously(auth).then(() => {
          onAuthStateChanged(auth, (currentUser) => {
            state.user = currentUser;
            if (currentUser) {
              // Escuta em tempo real do Firebase
              const itemsCol = collection(db, 'artifacts', appId, 'public', 'data', 'items');
              const transCol = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

              onSnapshot(itemsCol, (snapshot) => {
                const list = [];
                snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                list.sort((a, b) => a.name.localeCompare(b.name));
                state.items = list;
                state.isSyncing = false;
                render();
              });

              onSnapshot(transCol, (snapshot) => {
                const list = [];
                snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                state.transactions = list;
                render();
              });
            }
          });
        });
      } catch (e) {
        console.error("Falha ao inicializar o Firebase:", e);
        isFirebaseActive = false;
      }
    } else {
      // Carregamento rápido offline
      state.items = JSON.parse(localStorage.getItem('local_items') || '[]');
      state.transactions = JSON.parse(localStorage.getItem('local_transactions') || '[]');
    }

    window.handleSaveOperator = async (e) => {
      e.preventDefault();
      const inputName = document.getElementById('inputSellerName').value.trim();
      if (!inputName) {
        window.showAlert("Por favor, digite seu nome ou barraca!", "warning");
        return;
      }

      state.sellerName = inputName;
      state.operatorRole = state.tempRole;
      state.isSettingName = false;

      localStorage.setItem('junina_seller_name', inputName);
      localStorage.setItem('junina_role', state.tempRole);

      if (state.operatorRole === 'CAIXA') {
        state.activeTab = 'vender_fichas';
      } else if (state.operatorRole === 'BARRACA') {
        state.activeTab = 'entregar_produtos';
      } else {
        state.activeTab = 'painel';
      }

      window.showAlert(`Perfil definido: ${inputName}! 🤠`, "success");
      render();
    };

    window.selectTempRole = (role) => {
      state.tempRole = role;
      render();
    };

    window.handleChangeRole = () => {
      state.tempSellerName = state.sellerName;
      state.tempRole = state.operatorRole;
      state.isSettingName = true;
      render();
    };

    window.setActiveTab = (tab) => {
      state.activeTab = tab;
      render();
    };

    window.setPaymentMethod = (method) => {
      state.paymentMethod = method;
      render();
    };

    window.handleSellTokens = async (type, qty) => {
      if (!state.sellerName) {
        state.isSettingName = true;
        render();
        return;
      }

      const q = parseInt(qty);
      if (q <= 0 || isNaN(q)) {
        window.showAlert("Quantidade inválida!", "error");
        return;
      }

      const priceUnit = type === 'Comum' ? 5.00 : 7.50;
      const totalValue = priceUnit * q;

      await database.addTransaction({
        type: 'VENDA_FICHA',
        tokenType: type,
        qty: q,
        price: priceUnit,
        total: totalValue,
        paymentMethod: state.paymentMethod,
        sellerName: state.sellerName
      });

      window.showAlert(`🎟️ Vendido: ${q}x Ficha ${type} (R$ ${totalValue.toFixed(2)})!`, "success");
    };

    window.handleDeliverProduct = async (itemId, qtyToDeliver) => {
      if (!state.sellerName) {
        state.isSettingName = true;
        render();
        return;
      }

      const item = state.items.find(i => i.id === itemId);
      if (!item) return;

      if (item.stock <= 0) {
        window.showAlert(`🚫 Estoque físico ESGOTADO para: ${item.name}!`, "error");
        return;
      }

      if (item.stock < qtyToDeliver) {
        window.showAlert(`⚠️ Apenas ${item.stock} unidades disponíveis no estoque!`, "warning");
        return;
      }

      const tokenTypeNeeded = parseFloat(item.price) === 7.50 ? 'Especial' : 'Comum';

      // Deduz o estoque
      const updatedStock = item.stock - qtyToDeliver;
      await database.updateStock(item.id, updatedStock);

      // Registra a transação de baixa
      await database.addTransaction({
        type: 'ENTREGA_PRODUTO',
        itemId: item.id,
        itemName: item.name,
        qty: qtyToDeliver,
        tokenTypeUsed: tokenTypeNeeded,
        price: parseFloat(item.price),
        total: parseFloat(item.price) * qtyToDeliver,
        sellerName: state.sellerName
      });

      window.showAlert(`✅ Baixa registrada! ${qtyToDeliver}x "${item.name}" entregue.`, "success");
    };

    window.handleAddNewItem = async (e) => {
      e.preventDefault();
      const name = document.getElementById('newItemName').value.trim();
      const price = parseFloat(document.getElementById('newItemPrice').value);
      const stock = parseInt(document.getElementById('newItemStock').value);
      const category = document.getElementById('newItemCategory').value;

      if (!name || isNaN(price) || isNaN(stock) || stock < 0) {
        window.showAlert("Preencha todos os campos corretamente!", "warning");
        return;
      }

      await database.saveItem({
        id: crypto.randomUUID(),
        name,
        price,
        stock,
        category
      });

      window.showAlert(`🎉 "${name}" inserido com sucesso!`, "success");
      document.getElementById('newItemName').value = '';
      document.getElementById('newItemStock').value = '';
    };

    window.handleUpdateStockDirectly = async (itemId, newStockValue, itemName) => {
      await database.updateStock(itemId, newStockValue);
      window.showAlert(`Estoque de "${itemName}" ajustado para ${newStockValue}.`, "info");
    };

    window.handleDeleteItem = (itemId, itemName) => {
      state.confirmDeleteData = { id: itemId, name: itemName };
      render();
    };

    window.closeDeleteModal = () => {
      state.confirmDeleteData = null;
      render();
    };

    window.executeDeleteItem = async () => {
      if (!state.confirmDeleteData) return;
      await database.deleteItem(state.confirmDeleteData.id);
      window.showAlert(`🗑️ "${state.confirmDeleteData.name}" removido do cardápio.`, "info");
      state.confirmDeleteData = null;
      render();
    };

    function render() {
      const appEl = document.getElementById('app');
      
      // Métrica de cálculos
      const totalFichasComunsVendidas = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Comum')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasEspeciaisVendidas = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Especial')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasComunsEntregues = state.transactions
        .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Comum')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasEspeciaisEntregues = state.transactions
        .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Especial')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const revenueCaixa = state.transactions
        .filter(t => t.type === 'VENDA_FICHA')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentDinheiro = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Dinheiro')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentPIX = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'PIX')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentCartao = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Cartão')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const fichasComunsEmCirculacao = Math.max(0, totalFichasComunsVendidas - totalFichasComunsEntregues);
      const fichasEspeciaisEmCirculacao = Math.max(0, totalFichasEspeciaisVendidas - totalFichasEspeciaisEntregues);

      const lowStockItems = state.items.filter(item => item.stock > 0 && item.stock <= 5);
      const outOfStockItems = state.items.filter(item => item.stock === 0);

      appEl.innerHTML = `
        <!-- Banner de Festa Junina -->
        <div class="bg-gradient-to-r from-amber-600 via-orange-500 to-red-600 text-white relative overflow-hidden shadow-lg">
          <div class="absolute top-0 left-0 w-full flex justify-around opacity-40 select-none pointer-events-none text-lg">
            <span>🔺</span><span class="text-yellow-300">🔻</span>
            <span>🔺</span><span class="text-yellow-200">🔻</span>
            <span>🔺</span><span class="text-yellow-300">🔻</span>
            <span>🔺</span><span class="text-yellow-100">🔻</span>
            <span>🔺</span><span class="text-yellow-300">🔻</span>
          </div>
          
          <div class="max-w-4xl mx-auto px-4 py-6 text-center relative z-10">
            <div class="flex items-center justify-center gap-2 mb-1">
              <span class="text-3xl animate-bounce">🔥</span>
              <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight font-serif text-yellow-300 drop-shadow-md">
                ARRAIAL CONCILIA SYNC
              </h1>
              <span class="text-3xl animate-bounce">🌽</span>
            </div>
            <p class="text-xs md:text-sm text-orange-100 font-bold tracking-widest uppercase">
              Controle de Caixas, Fichas de Valores e Baixas Rápidas de Estoque
            </p>
          </div>
        </div>

        <!-- Alerta de Conexão Local / Offline -->
        <div class="bg-amber-100 border-b border-amber-200 py-2 px-4 text-xs">
          <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-slate-700">
            <div class="flex items-center gap-2 font-bold">
              <span class="relative flex h-2.5 w-2.5">
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 ${isFirebaseActive ? 'bg-emerald-500' : 'bg-orange-500 animate-pulse'}"></span>
              </span>
              <span>
                ${isFirebaseActive 
                  ? '🌐 Sincronizado em Nuvem (Multi-Celulares Ativo)' 
                  : '📲 Modo Local (Dados salvos neste aparelho. Sem complicação com Firebase!)'}
              </span>
            </div>
            
            <div class="flex items-center gap-2">
              ${state.sellerName ? `
                <button 
                  onclick="handleChangeRole()"
                  class="flex items-center gap-1.5 bg-white px-2.5 py-1 rounded-full text-slate-700 font-bold shadow-xs transition text-[11px]"
                >
                  <i data-lucide="users" class="w-3 h-3 text-orange-600"></i>
                  <span>Colaborador: <strong class="text-orange-700">${state.sellerName}</strong></span>
                  <span class="bg-orange-100 text-orange-800 text-[9px] px-1.5 py-0.25 rounded-md font-black uppercase">
                    ${state.operatorRole === 'CAIXA' ? 'Caixa' : state.operatorRole === 'BARRACA' ? 'Barraca' : 'Gestão'}
                  </span>
                  <span class="text-[10px] text-blue-600 underline ml-0.5">(Trocar)</span>
                </button>
              ` : `
                <button 
                  onclick="handleChangeRole()"
                  class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-3 py-1 rounded-full text-[11px]"
                >
                  Entrar como Colaborador
                </button>
              `}
            </div>
          </div>
        </div>

        ${state.alertMessage ? `
          <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-sm shadow-2xl rounded-2xl overflow-hidden animate-bounce">
            <div class="p-4 flex items-center justify-between text-white font-bold ${
              state.alertMessage.type === 'success' ? 'bg-emerald-600' :
              state.alertMessage.type === 'error' ? 'bg-red-600' :
              state.alertMessage.type === 'warning' ? 'bg-amber-500' : 'bg-blue-600'
            }">
              <div class="flex items-center gap-2">
                <span class="text-xs md:text-sm">${state.alertMessage.text}</span>
              </div>
            </div>
          </div>
        ` : ''}

        <!-- Confirmação de exclusão de produto -->
        ${state.confirmDeleteData ? `
          <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border-2 border-red-500">
              <h3 class="text-lg font-bold text-slate-900">⚠️ Confirmar Remoção</h3>
              <p class="text-sm text-slate-600 mt-2">
                Tem certeza de que deseja remover o produto <strong>"${state.confirmDeleteData.name}"</strong>? Ele sumirá das opções de baixa das barracas.
              </p>
              <div class="mt-4 flex gap-3 justify-end">
                <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl">Voltar</button>
                <button onclick="executeDeleteItem()" class="px-4 py-2 text-sm font-bold bg-red-600 hover:bg-red-700 text-white rounded-xl">Deletar do Cardápio</button>
              </div>
            </div>
          </div>
        ` : ''}

        <main class="max-w-4xl mx-auto px-3 py-4">

          ${state.isSettingName ? `
            <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-40 flex items-center justify-center p-4">
              <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-amber-500">
                <div class="text-center mb-4">
                  <span class="text-4xl block mb-2">🤠</span>
                  <h3 class="text-xl font-black text-slate-800">Selecione seu Perfil</h3>
                  <p class="text-xs text-slate-500 mt-1">
                    Os caixas vendem as fichas físicas de R$ 5,00 ou R$ 7,50. Cada barraca recebe as fichas correspondentes e dá a baixa do produto entregue!
                  </p>
                </div>
                <form onsubmit="handleSaveOperator(event)" class="space-y-4">
                  <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Seu Nome / Identificação</label>
                    <input
                      id="inputSellerName"
                      type="text"
                      placeholder="Ex: Pedro Caixa, Barraca Pipoca..."
                      value="${state.tempSellerName}"
                      class="w-full px-3 py-2.5 border-2 border-amber-200 rounded-xl focus:outline-none focus:border-orange-500 text-center text-base font-bold"
                      maxlength="20"
                      required
                    />
                  </div>

                  <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Sua Função</label>
                    <div class="grid grid-cols-3 gap-1.5">
                      <button
                        type="button"
                        onclick="selectTempRole('CAIXA')"
                        class="p-2 rounded-xl text-center border-2 flex flex-col items-center justify-center gap-1 transition ${
                          state.tempRole === 'CAIXA' 
                            ? 'border-orange-500 bg-orange-50 text-orange-700 font-extrabold' 
                            : 'border-slate-100 bg-slate-50 text-slate-600 hover:bg-slate-100'
                        }"
                      >
                        <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                        <span class="text-[10px]">Vende Fichas</span>
                      </button>

                      <button
                        type="button"
                        onclick="selectTempRole('BARRACA')"
                        class="p-2 rounded-xl text-center border-2 flex flex-col items-center justify-center gap-1 transition ${
                          state.tempRole === 'BARRACA' 
                            ? 'border-orange-500 bg-orange-50 text-orange-700 font-extrabold' 
                            : 'border-slate-100 bg-slate-50 text-slate-600 hover:bg-slate-100'
                        }"
                      >
                        <i data-lucide="truck" class="w-4 h-4"></i>
                        <span class="text-[10px]">Entrega Item</span>
                      </button>

                      <button
                        type="button"
                        onclick="selectTempRole('ADMIN')"
