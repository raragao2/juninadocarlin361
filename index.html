<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arraial Concilia Sync - Controle de Fichas e Estoque</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config para cores personalizadas -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'ui-serif', 'serif'],
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #fffbeb;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #f97316;
      border-radius: 10px;
    }
  </style>
</head>
<body class="min-h-screen bg-orange-50 text-slate-800 font-sans pb-16">

  <div id="app">
    <!-- Splash screen / Loading Inicial -->
    <div class="flex flex-col items-center justify-center min-h-screen bg-orange-50 p-4">
      <div class="text-center animate-pulse">
        <span class="text-6xl">🔥</span>
        <h2 class="text-2xl font-black text-orange-600 mt-4">Carregando o Arraial...</h2>
        <p class="text-sm text-slate-500 mt-2">Preparando as barracas e fogueira em tempo real.</p>
      </div>
    </div>
  </div>

  <!-- FIREBASE & APPLICATION LOGIC -->
  <script type="module">
    // Importações dos SDKs do Firebase via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let firebaseConfig = {};
    let isConfigPending = false;

    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = JSON.parse(__firebase_config);
      } else {
        // ATENÇÃO: Substitua os dados abaixo pelas credenciais do seu Firebase gratuito!
        firebaseConfig = {
          apiKey: "",
          authDomain: "",
          projectId: "",
          storageBucket: "",
          messagingSenderId: "",
          appId: ""
        };
      }
    } catch (e) {
      console.error("Erro ao processar as configurações do Firebase:", e);
    }

    // Se as chaves estiverem vazias fora do ambiente de testes, aciona o instalador amigável
    if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "") {
      isConfigPending = true;
    }

    // ESTADO GLOBAL DO APLICATIVO
    const state = {
      user: null,
      operatorRole: localStorage.getItem('junina_role') || 'BARRACA',
      sellerName: localStorage.getItem('junina_seller_name') || '',
      isSettingName: !localStorage.getItem('junina_seller_name'),
      tempSellerName: localStorage.getItem('junina_seller_name') || '',
      tempRole: localStorage.getItem('junina_role') || 'BARRACA',
      items: [],
      transactions: [],
      activeTab: localStorage.getItem('junina_role') === 'CAIXA' ? 'vender_fichas' : 'entregar_produtos',
      alertMessage: null,
      isSyncing: true,
      confirmDeleteData: null,
      paymentMethod: 'Dinheiro',
      newItemName: '',
      newItemPrice: '5.00',
      newItemStock: '',
      newItemCategory: 'Comida',
      tokenQtyComum: 1,
      tokenQtyEspecial: 1
    };

    function renderSetupWizard() {
      const appEl = document.getElementById('app');
      appEl.innerHTML = `
        <div class="max-w-xl mx-auto px-4 py-8">
          <div class="bg-white rounded-3xl border-2 border-amber-400 p-6 shadow-xl text-center">
            <span class="text-6xl">🔥</span>
            <h1 class="text-2xl font-black text-orange-600 mt-4 font-serif">Sua Fogueira está quase acesa!</h1>
            <p class="text-sm text-slate-600 mt-2">
              Para sincronizar o estoque em tempo real entre os 4 celulares, o sistema precisa de um banco de dados gratuito do Firebase.
            </p>

            <div class="mt-6 text-left space-y-4">
              <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider border-b border-amber-100 pb-2">Passo a Passo Rápido (3 Minutos):</h2>
              
              <div class="flex gap-3">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-amber-100 text-xs font-bold text-amber-800">1</span>
                <p class="text-xs text-slate-600">
                  Acesse o <a href="https://console.firebase.google.com/" target="_blank" class="text-orange-600 underline font-bold">Firebase Console</a>, entre com sua conta Google e clique em <strong>"Adicionar Projeto"</strong> (chame de "Festa Junina").
                </p>
              </div>

              <div class="flex gap-3">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-amber-100 text-xs font-bold text-amber-800">2</span>
                <p class="text-xs text-slate-600">
                  No painel do projeto, clique no ícone de <strong>Web (&lt;/&gt;)</strong> para registrar um app. Ele vai te dar um código com as credenciais (<code>firebaseConfig</code>).
                </p>
              </div>

              <div class="flex gap-3">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-amber-100 text-xs font-bold text-amber-800">3</span>
                <p class="text-xs text-slate-600">
                  No menu lateral esquerdo do Firebase, clique em <strong>Build > Firestore Database</strong>, crie o banco em <strong>Modo de Teste</strong> e ative. Clique também em <strong>Build > Authentication</strong>, ative o provedor <strong>Anônimo (Anonymous)</strong>.
                </p>
              </div>

              <div class="flex gap-3">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-amber-100 text-xs font-bold text-amber-800">4</span>
                <p class="text-xs text-slate-600">
                  Abra seu arquivo <code>index.html</code> no seu repositório do GitHub, clique no ícone do lápis para editar, procure pela linha <strong>51</strong> e cole as chaves que você copiou do passo 2. Salve e o app funcionará na hora!
                </p>
              </div>
            </div>

            <div class="mt-6 bg-amber-50 p-4 rounded-2xl text-left border border-amber-200">
              <p class="text-[10px] uppercase font-bold text-amber-800 tracking-wider">Substitua esta seção no seu index.html:</p>
              <pre class="text-[10px] bg-slate-900 text-green-400 p-3 rounded-lg mt-1 overflow-x-auto font-mono">
firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};</pre>
            </div>
            
            <p class="text-[10px] text-slate-400 mt-4">
              Dúvidas? Deixe essa tela aberta e siga os passos no computador para liberar o acesso das barracas!
            </p>
          </div>
        </div>
      `;
    }

    if (isConfigPending) {
      renderSetupWizard();
    } else {
      // Inicia o app se as credenciais existirem
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'festa-junina-baixas';

      window.showAlert = function(text, type = 'info') {
        state.alertMessage = { text, type };
        render();
        setTimeout(() => {
          state.alertMessage = null;
          render();
        }, 4000);
      }

      async function initAuthWithRetry() {
        let delay = 1000;
        for (let attempt = 1; attempt <= 5; attempt++) {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            return;
          } catch (error) {
            if (attempt === 5) {
              window.showAlert("Erro crítico de conexão com o banco do Firebase.", "error");
            }
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
      }

      function startDatabaseSubscriptions() {
        if (!state.user) return;

        state.isSyncing = true;
        render();

        const itemsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'items');
        const transactionsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

        onSnapshot(itemsCollection, 
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            list.sort((a, b) => a.name.localeCompare(b.name));
            state.items = list;
            state.isSyncing = false;
            render();
          },
          (error) => {
            console.error("Erro ao sincronizar produtos:", error);
            window.showAlert("Verifique se as regras do Firestore Database estão em modo teste públicos.", "error");
          }
        );

        onSnapshot(transactionsCollection,
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            list.sort((a, b) => {
              const timeA = a.timestamp?.seconds || 0;
              const timeB = b.timestamp?.seconds || 0;
              return timeB - timeA;
            });
            state.transactions = list;
            render();
          },
          (error) => {
            console.error("Erro ao sincronizar transações:", error);
          }
        );
      }

      window.handleSaveOperator = async (e) => {
        e.preventDefault();
        const inputName = document.getElementById('inputSellerName').value.trim();
        if (!inputName) {
          window.showAlert("Por favor, digite seu nome ou barraca!", "warning");
          return;
        }

        state.sellerName = inputName;
        state.operatorRole = state.tempRole;
        state.isSettingName = false;

        localStorage.setItem('junina_seller_name', inputName);
        localStorage.setItem('junina_role', state.tempRole);

        if (state.operatorRole === 'CAIXA') {
          state.activeTab = 'vender_fichas';
        } else if (state.operatorRole === 'BARRACA') {
          state.activeTab = 'entregar_produtos';
        } else {
          state.activeTab = 'painel';
        }

        window.showAlert(`Perfil definido: ${inputName}! 🤠`, "success");
        render();
      };

      window.selectTempRole = (role) => {
        state.tempRole = role;
        render();
      };

      window.handleChangeRole = () => {
        state.tempSellerName = state.sellerName;
        state.tempRole = state.operatorRole;
        state.isSettingName = true;
        render();
      };

      window.setActiveTab = (tab) => {
        state.activeTab = tab;
        render();
      };

      window.setPaymentMethod = (method) => {
        state.paymentMethod = method;
        render();
      };

      window.handleSellTokens = async (type, qty) => {
        if (!state.sellerName) {
          state.isSettingName = true;
          render();
          return;
        }

        const q = parseInt(qty);
        if (q <= 0 || isNaN(q)) {
          window.showAlert("Quantidade inválida!", "error");
          return;
        }

        const priceUnit = type === 'Comum' ? 5.00 : 7.50;
        const totalValue = priceUnit * q;

        try {
          const transColRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
          await addDoc(transColRef, {
            type: 'VENDA_FICHA',
            tokenType: type,
            qty: q,
            price: priceUnit,
            total: totalValue,
            paymentMethod: state.paymentMethod,
            sellerName: state.sellerName,
            timestamp: serverTimestamp()
          });
          window.showAlert(`🎟️ Vendido: ${q}x Ficha ${type} (R$ ${totalValue.toFixed(2)})!`, "success");
        } catch (error) {
          console.error(error);
          window.showAlert("Erro ao salvar a venda de fichas no banco.", "error");
        }
      };

      window.handleDeliverProduct = async (itemId, qtyToDeliver) => {
        if (!state.sellerName) {
          state.isSettingName = true;
          render();
          return;
        }

        const item = state.items.find(i => i.id === itemId);
        if (!item) return;

        if (item.stock <= 0) {
          window.showAlert(`🚫 Estoque físico ESGOTADO para: ${item.name}!`, "error");
          return;
        }

        if (item.stock < qtyToDeliver) {
          window.showAlert(`⚠️ Apenas ${item.stock} itens físicos disponíveis no estoque!`, "warning");
          return;
        }

        const tokenTypeNeeded = parseFloat(item.price) === 7.50 ? 'Especial' : 'Comum';

        try {
          const itemDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', item.id);
          const transColRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

          await updateDoc(itemDocRef, {
            stock: increment(-qtyToDeliver)
          });

          await addDoc(transColRef, {
            type: 'ENTREGA_PRODUTO',
            itemId: item.id,
            itemName: item.name,
            qty: qtyToDeliver,
            tokenTypeUsed: tokenTypeNeeded,
            price: parseFloat(item.price),
            total: parseFloat(item.price) * qtyToDeliver,
            sellerName: state.sellerName,
            timestamp: serverTimestamp()
          });

          window.showAlert(`✅ Baixa registrada! ${qtyToDeliver}x "${item.name}" entregue.`, "success");
        } catch (error) {
          console.error(error);
          window.showAlert("Erro de comunicação com o banco para realizar a entrega.", "error");
        }
      };

      window.handleAddNewItem = async (e) => {
        e.preventDefault();
        const name = document.getElementById('newItemName').value.trim();
        const price = parseFloat(document.getElementById('newItemPrice').value);
        const stock = parseInt(document.getElementById('newItemStock').value);
        const category = document.getElementById('newItemCategory').value;

        if (!name || isNaN(price) || isNaN(stock) || stock < 0) {
          window.showAlert("Preencha todos os campos corretamente!", "warning");
          return;
        }

        try {
          const itemsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'items');
          const customId = crypto.randomUUID();
          await setDoc(doc(itemsColRef, customId), {
            name,
            price,
            stock,
            category,
            createdAt: serverTimestamp()
          });
          window.showAlert(`🎉 "${name}" inserido com sucesso!`, "success");
          
          document.getElementById('newItemName').value = '';
          document.getElementById('newItemStock').value = '';
        } catch (error) {
          console.error(error);
          window.showAlert("Erro ao cadastrar produto.", "error");
        }
      };

      window.handleUpdateStockDirectly = async (itemId, newStockValue, itemName) => {
        const val = parseInt(newStockValue);
        if (isNaN(val) || val < 0) return;

        try {
          const itemDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', itemId);
          await updateDoc(itemDocRef, { stock: val });
          window.showAlert(`Estoque de "${itemName}" ajustado para ${val}.`, "info");
        } catch (error) {
          window.showAlert("Erro ao atualizar estoque.", "error");
        }
      };

      window.handleDeleteItem = (itemId, itemName) => {
        state.confirmDeleteData = { id: itemId, name: itemName };
        render();
      };

      window.closeDeleteModal = () => {
        state.confirmDeleteData = null;
        render();
      };

      window.executeDeleteItem = async () => {
        if (!state.confirmDeleteData) return;
        try {
          const itemDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', state.confirmDeleteData.id);
          await deleteDoc(itemDocRef);
          window.showAlert(`🗑️ "${state.confirmDeleteData.name}" removido do cardápio.`, "info");
        } catch (error) {
          window.showAlert("Erro ao deletar produto.", "error");
        } finally {
          state.confirmDeleteData = null;
          render();
        }
      };

      initAuthWithRetry();
      onAuthStateChanged(auth, (currentUser) => {
        state.user = currentUser;
        if (currentUser) {
          startDatabaseSubscriptions();
        }
      });

      function render() {
        const appEl = document.getElementById('app');
        
        const totalFichasComunsVendidas = state.transactions
          .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Comum')
          .reduce((sum, t) => sum + (t.qty || 0), 0);

        const totalFichasEspeciaisVendidas = state.transactions
          .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Especial')
          .reduce((sum, t) => sum + (t.qty || 0), 0);

        const totalFichasComunsEntregues = state.transactions
          .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Comum')
          .reduce((sum, t) => sum + (t.qty || 0), 0);

        const totalFichasEspeciaisEntregues = state.transactions
          .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Especial')
          .reduce((sum, t) => sum + (t.qty || 0), 0);

        const revenueCaixa = state.transactions
          .filter(t => t.type === 'VENDA_FICHA')
          .reduce((sum, t) => sum + (t.total || 0), 0);

        const totalPaymentDinheiro = state.transactions
          .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Dinheiro')
          .reduce((sum, t) => sum + (t.total || 0), 0);

        const totalPaymentPIX = state.transactions
          .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'PIX')
          .reduce((sum, t) => sum + (t.total || 0), 0);

        const totalPaymentCartao = state.transactions
          .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Cartão')
          .reduce((sum, t) => sum + (t.total || 0), 0);

        const fichasComunsEmCirculacao = Math.max(0, totalFichasComunsVendidas - totalFichasComunsEntregues);
        const fichasEspeciaisEmCirculacao = Math.max(0, totalFichasEspeciaisVendidas - totalFichasEspeciaisEntregues);

        const lowStockItems = state.items.filter(item => item.stock > 0 && item.stock <= 5);
        const outOfStockItems = state.items.filter(item => item.stock === 0);

        appEl.innerHTML = `
          <!-- Festive Top Banner -->
          <div class="bg-gradient-to-r from-amber-600 via-orange-500 to-red-600 text-white relative overflow-hidden shadow-lg">
            <div class="absolute top-0 left-0 w-full flex justify-around opacity-40 select-none pointer-events-none text-lg">
              <span>🔺</span><span class="text-yellow-300">🔻</span>
              <span>🔺</span><span class="text-yellow-200">🔻</span>
              <span>🔺</span><span class="text-yellow-300">🔻</span>
              <span>🔺</span><span class="text-yellow-100">🔻</span>
              <span>🔺</span><span class="text-yellow-300">🔻</span>
            </div>
            
            <div class="max-w-4xl mx-auto px-4 py-6 text-center relative z-10">
              <div class="flex items-center justify-center gap-2 mb-1">
                <span class="text-3xl animate-bounce">🔥</span>
                <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight font-serif text-yellow-300 drop-shadow-md">
                  ARRAIAL CONCILIA SYNC
                </h1>
                <span class="text-3xl animate-bounce">🌽</span>
              </div>
              <p class="text-xs md:text-sm text-orange-100 font-bold tracking-widest uppercase">
                Sistema Inteligente de Caixa, Fichas e Entrega Física em Tempo Real
              </p>
            </div>
          </div>

          <!-- Connection & Sync Bar -->
          <div class="bg-amber-100 border-b border-amber-200 py-1.5 px-4 text-xs">
            <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-slate-600">
              <div class="flex items-center gap-2 font-medium">
                <span class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${state.isSyncing ? 'bg-amber-400' : 'bg-emerald-400'} opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 ${state.isSyncing ? 'bg-amber-500' : 'bg-emerald-500'}"></span>
                </span>
                <span>${state.isSyncing ? 'Conectando...' : 'Arraial Sincronizado com todos os celulares'}</span>
              </div>
              
              <div class="flex items-center gap-2">
                ${state.sellerName ? `
                  <button 
                    onclick="handleChangeRole()"
                    class="flex items-center gap-1.5 bg-white/70 hover:bg-white px-2.5 py-1 rounded-full text-slate-700 font-bold shadow-xs transition text-[11px]"
                  >
                    <i data-lucide="users" class="w-3 h-3 text-orange-600"></i>
                    <span>Operador: <strong class="text-orange-700">${state.sellerName}</strong></span>
                    <span class="bg-orange-100 text-orange-800 text-[9px] px-1.5 py-0.25 rounded-md font-black uppercase">
                      ${state.operatorRole === 'CAIXA' ? 'Caixa' : state.operatorRole === 'BARRACA' ? 'Barraca' : 'Gestão'}
                    </span>
                    <span class="text-[10px] text-blue-600 underline ml-0.5">(Trocar)</span>
                  </button>
                ` : `
                  <button 
                    onclick="handleChangeRole()"
                    class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-3 py-1 rounded-full text-[11px]"
                  >
                    Entrar como Colaborador
                  </button>
                `}
              </div>
            </div>
          </div>

          <!-- Floating Notifications -->
          ${state.alertMessage ? `
            <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-sm shadow-2xl rounded-2xl overflow-hidden animate-bounce">
              <div class="p-4 flex items-center justify-between text-white font-bold ${
                state.alertMessage.type === 'success' ? 'bg-emerald-600' :
                state.alertMessage.type === 'error' ? 'bg-red-600' :
                state.alertMessage.type === 'warning' ? 'bg-amber-500' : 'bg-blue-600'
              }">
                <div class="flex items-center gap-2">
                  <span class="text-xs md:text-sm">${state.alertMessage.text}</span>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Confirmation Modal -->
          ${state.confirmDeleteData ? `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
              <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border-2 border-red-500">
                <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                  ⚠️ Confirmar Remoção
                </h3>
                <p class="text-sm text-slate-600 mt-2">
                  Tem certeza de que deseja remover o produto <strong>"${state.confirmDeleteData.name}"</strong>? Isto não apagará as baixas existentes, mas o item sumirá das barracas.
                </p>
                <div class="mt-4 flex gap-3 justify-end">
                  <button
                    onclick="closeDeleteModal()"
                    class="px-4 py-2 text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl"
                  >
                    Voltar
                  </button>
                  <button
                    onclick="executeDeleteItem()"
                    class="px-4 py-2 text-sm font-bold bg-red-600 hover:bg-red-700 text-white rounded-xl"
                  >
                    Deletar do Cardápio
                  </button>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- MAIN APP WINDOW -->
          <main class="max-w-4xl mx-auto px-3 py-4">

            <!-- User Identification Overlap -->
            ${state.isSettingName ? `

                        id="newItemName"
                        type="text"
                        placeholder="Ex: Milho Cozido, Espetinho Carne..."
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm font-semibold"
                        required
                      />
                    </div>

                    <div>
                      <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">Exige qual Ficha?</label>
                      <select
                        id="newItemPrice"
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:border-orange-500 text-sm font-semibold"
                      >
                        <option value="5.00">R$ 5,00 (Ficha Comum)</option>
                        <option value="7.50">R$ 7,50 (Ficha Especial)</option>
                      </select>
                    </div>

                    <div>
                      <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">Estoque Físico</label>
                      <input
                        id="newItemStock"
                        type="number"
                        placeholder="Quantidade"
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm font-semibold"
                        required
                      />
                    </div>

                    <div class="col-span-1 md:col-span-2">
                      <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">Categoria</label>
                      <select
                        id="newItemCategory"
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:border-orange-500 text-sm font-semibold"
                      >
                        <option value="Comida">🌽 Comida</option>
                        <option value="Bebida">🍹 Bebida</option>
                        <option value="Brincadeira">🎯 Brincadeira</option>
                        <option value="Outros">🎁 Outros</option>
                      </select>
                    </div>

                    <div class="col-span-1 md:col-span-4 pt-1">
                      <button
                        type="submit"
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-4 rounded-xl shadow transition"
                      >
                        Salvar Produto no Cardápio Sincronizado ✔️
                      </button>
                    </div>
                  </form>
                </div>

                <!-- Lista de Produtos para edição de estoque rápida -->
                <div class="bg-white rounded-2xl border border-amber-200 p-4 shadow-xs">
                  <h3 class="font-extrabold text-slate-800 text-base mb-2">Ajustar Estoque ou Excluir Itens</h3>
                  ${state.items.length === 0 ? `
                    <p class="text-center py-6 text-slate-400 text-xs">Nenhum produto cadastrado.</p>
                  ` : `
                    <div class="overflow-x-auto">
                      <table class="w-full text-left text-xs md:text-sm">
                        <thead>
                          <tr class="border-b border-slate-100 text-slate-400 uppercase text-[9px] tracking-wider font-bold">
                            <th class="py-2">Item</th>
                            <th class="py-2 text-right">Valor</th>
                            <th class="py-2 text-center w-36">Estoque Físico</th>
                            <th class="py-2 text-center w-12">Remover</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                          ${state.items.map((item) => `
                            <tr class="hover:bg-slate-50">
                              <td class="py-3">
                                <span class="font-black text-slate-800 block">${item.name}</span>
                                <span class="text-[9px] text-slate-500 bg-slate-100 px-1.5 py-0.25 rounded uppercase">
                                  ${item.category}
                                </span>
                              </td>
                              <td class="py-3 text-right font-extrabold text-slate-700">
                                R$ ${parseFloat(item.price).toFixed(2)}
                              </td>
                              <td class="py-3">
                                <div class="flex items-center justify-center gap-1.5">
                                  <button
                                    type="button"
                                    onclick="handleUpdateStockDirectly('${item.id}', ${Math.max(0, item.stock - 1)}, '${item.name}')"
                                    class="h-7 w-7 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 active:scale-95 flex items-center justify-center font-bold"
                                  >
                                    -
                                  </button>
                                  <input
                                    type="number"
                                    value="${item.stock}"
                                    onchange="handleUpdateStockDirectly('${item.id}', this.value, '${item.name}')"
                                    class="w-14 text-center border border-slate-200 rounded-md py-1 px-1 font-extrabold text-slate-800"
                                  />
                                  <button
                                    type="button"
                                    onclick="handleUpdateStockDirectly('${item.id}', ${item.stock + 1}, '${item.name}')"
                                    class="h-7 w-7 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 active:scale-95 flex items-center justify-center font-bold"
                                  >
                                    +
                                  </button>
                                </div>
                              </td>
                              <td class="py-3 text-center">
                                <button
                                  type="button"
                                  onclick="handleDeleteItem('${item.id}', '${item.name}')"
                                  class="p-1.5 text-slate-400 hover:text-red-600 rounded-lg hover:bg-slate-50 transition"
                                >
                                  Excluir
                                </button>
                              </td>
                            </tr>
                          `).join('')}
                        </tbody>
                      </table>
                    </div>
                  `}
                </div>
              </div>
            ` : ''}

            <!-- TAB CONTENT: Histórico / Atividades Gerais -->
            ${state.activeTab === 'historico_geral' ? `
              <div class="bg-white rounded-2xl border border-amber-200 p-4 shadow-xs">
                <h3 class="font-extrabold text-slate-800 text-base mb-1">Linha do Tempo das Atividades</h3>
                <p class="text-xs text-slate-500 mb-4">
                  Histórico em tempo real de vendas e baixas processadas em todos os celulares conectados.
                </p>

                ${state.transactions.length === 0 ? `
                  <div class="text-center py-12 text-slate-400">
                    <p class="text-4xl mb-2">⏳</p>
                    <p class="font-bold">Nenhuma atividade registrada.</p>
                  </div>
                ` : `
                  <div class="divide-y divide-slate-100 max-h-[60vh] overflow-y-auto pr-1">
                    ${state.transactions.slice(0, 50).map((trans) => {
                      const isSale = trans.type === 'VENDA_FICHA';
                      const timeString = trans.timestamp?.seconds 
                        ? new Date(trans.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})
                        : 'Sincronizando...';

                      return `
                        <div class="py-3 flex items-center justify-between text-xs md:text-sm hover:bg-slate-50 px-2 rounded-lg transition">
                          <div class="flex items-start gap-2.5">
                            <span class="text-xl">${isSale ? '🎟️' : '🍿'}</span>
                            <div>
                              <p class="font-extrabold text-slate-800">
                                ${isSale 
                                  ? `Venda: ${trans.qty}x Ficha ${trans.tokenType}` 
                                  : `Entrega: ${trans.qty}x ${trans.itemName}`
                                }
                              </p>
                              <p class="text-[10px] text-slate-500 flex items-center gap-1.5 mt-0.5 flex-wrap">
                                <span class="bg-slate-100 text-slate-700 px-1.5 py-0.25 rounded">
                                  👤 ${trans.sellerName || 'Colaborador'}
                                </span>
                                ${isSale ? `
                                  <span class="bg-emerald-50 text-emerald-700 px-1 py-0.25 rounded font-bold uppercase">
                                    ${trans.paymentMethod || 'Dinheiro'}
                                  </span>
                                ` : `
                                  <span class="bg-amber-50 text-amber-700 px-1 py-0.25 rounded font-bold uppercase">
                                    Ficha ${trans.tokenTypeUsed}
                                  </span>
                                `}
                                <span>•</span>
                                <span>${timeString}</span>
                              </p>
                            </div>
                          </div>
                          <div class="font-bold text-slate-700">
                            R$ ${(trans.total || 0).toFixed(2)}
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                `}
              </div>
            ` : ''}

          </main>

          <!-- App Footer -->
          <footer class="text-center py-8 text-[11px] text-slate-400 border-t border-amber-100 mt-6 max-w-4xl mx-auto px-4">
            <p class="font-bold text-slate-500">🌽 Olha o Estoque! É verdade! 🌽</p>
            <p class="mt-1">Sistema integrado e otimizado para celulares do caixa e das barracas.</p>
            <p class="mt-2 text-[10px]">App ID: ${appId}</p>
          </footer>
        `;

        if (window.lucide) {
          window.lucide.createIcons();
        }
      }

      render();
    }
  </script>
</body>
</html>
