<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arraial da Favinho - Controle de Fichas e Estoque</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config para cores personalizadas -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'ui-serif', 'serif'],
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Customização fina para scrollbars e interações em dispositivos móveis */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #fffbeb;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #f97316;
      border-radius: 10px;
    }
    /* Impedir zoom duplo acidental ao clicar rápido nos botões no celular */
    button {
      touch-action: manipulation;
    }
  </style>
</head>
<body class="min-h-screen bg-orange-50 text-slate-800 font-sans pb-16">

  <!-- APP CONTAINER -->
  <div id="app">
    <!-- Splash screen / Loading Inicial -->
    <div class="flex flex-col items-center justify-center min-h-screen bg-orange-50 p-4">
      <div class="text-center">
        <span class="text-6xl animate-bounce block mb-4">🔥</span>
        <h2 class="text-2xl font-black text-orange-600">Preparando o Arraial...</h2>
        <p class="text-sm text-slate-500 mt-2">Carregando as barracas e conectando ao Firebase em tempo real.</p>
      </div>
    </div>
  </div>

  <!-- APPLICATION LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Credenciais fornecidas pelo usuário para sincronização simultânea nos 4 aparelhos
    const firebaseConfig = {
      apiKey: "AIzaSyCXLbPDiYkTZaAnEcVYqL1xx4-YyLN6Bc4",
      authDomain: "junina-43016.firebaseapp.com",
      projectId: "junina-43016",
      storageBucket: "junina-43016.firebasestorage.app",
      messagingSenderId: "890358574405",
      appId: "1:890358574405:web:a97eac65aa0167bca4a22c",
      measurementId: "G-60G9P21VHP"
    };

    const state = {
      dbConnected: false,
      isSyncing: true,
      operatorRole: localStorage.getItem('junina_role') || 'BARRACA',
      sellerName: localStorage.getItem('junina_seller_name') || '',
      isSettingName: !localStorage.getItem('junina_seller_name'),
      tempSellerName: localStorage.getItem('junina_seller_name') || '',
      tempRole: localStorage.getItem('junina_role') || 'BARRACA',
      items: [],
      transactions: [],
      activeTab: 'vender_fichas',
      alertMessage: null,
      confirmDeleteData: null,
      paymentMethod: 'Dinheiro',
      appId: 'arraial-principal'
    };

    // Itens padrão caso o banco de dados esteja totalmente vazio no primeiro uso
    const defaultItems = [
      { id: "1", name: "Salsichão", price: 5.00, stock: 50, category: "Comida" },
      { id: "2", name: "Pastel", price: 5.00, stock: 40, category: "Comida" },
      { id: "3", name: "Pipoca", price: 5.00, stock: 100, category: "Comida" },
      { id: "4", name: "Refrigerante", price: 5.00, stock: 60, category: "Bebida" },
      { id: "5", name: "Água com Gás", price: 7.50, stock: 30, category: "Bebida" }
    ];

    let db = null;
    let auth = null;

    async function tryConnectFirebase() {
      try {
        state.isSyncing = true;
        render();

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // Tenta fazer o login anônimo de forma isolada
        try {
          await signInAnonymously(auth);
          console.log("Autenticação anônima realizada com sucesso!");
        } catch (authErr) {
          console.warn("Aviso de Autenticação:", authErr);
          // NÃO interrompemos o fluxo! Se as regras do Firestore estiverem públicas,
          // o sincronismo continuará funcionando normalmente mesmo sem Auth ativa.
          showAlert("⚠️ Login anônimo pendente no painel. O sistema tentará sincronizar mesmo assim.", "warning");
        }
        
        state.dbConnected = true;
        startRealtimeSync();
      } catch (err) {
        console.error("Erro geral ao conectar no Firebase:", err);
        state.dbConnected = false;
        loadLocalFallbackData();
        state.isSyncing = false;
        render();
        showAlert("⚠️ Erro crítico. Rodando local temporariamente.", "error");
      }
    }

    function startRealtimeSync() {
      const itemsCollection = collection(db, 'artifacts', state.appId, 'public', 'data', 'items');
      const transactionsCollection = collection(db, 'artifacts', state.appId, 'public', 'data', 'transactions');

      // Escuta em tempo real dos produtos cadastrados
      onSnapshot(itemsCollection, (snapshot) => {
        const list = [];
        snapshot.forEach((doc) => {
          list.push({ id: doc.id, ...doc.data() });
        });

        if (list.length === 0) {
          defaultItems.forEach(async (item) => {
            await setDoc(doc(itemsCollection, item.id), item);
          });
        } else {
          list.sort((a, b) => a.name.localeCompare(b.name));
          state.items = list;
          state.isSyncing = false;
          render();
        }
      }, (error) => {
        console.error("Erro no fluxo de itens:", error);
        showAlert("⚠️ Permissão negada ou banco offline. Verifique as regras do Firebase.", "error");
      });

      // Escuta em tempo real das transações de vendas e baixas
      onSnapshot(transactionsCollection, (snapshot) => {
        const list = [];
        snapshot.forEach((doc) => {
          list.push({ id: doc.id, ...doc.data() });
        });
        list.sort((a, b) => {
          const timeA = a.timestamp?.seconds || 0;
          const timeB = b.timestamp?.seconds || 0;
          return timeB - timeA;
        });
        state.transactions = list;
        render();
      }, (error) => {
        console.error("Erro no fluxo de transações:", error);
      });
    }

    function loadLocalFallbackData() {
      try {
        const localItems = localStorage.getItem('junina_local_items');
        state.items = localItems ? JSON.parse(localItems) : defaultItems;
        const localTx = localStorage.getItem('junina_local_tx');
        state.transactions = localTx ? JSON.parse(localTx) : [];
      } catch(e) {
        state.items = defaultItems;
        state.transactions = [];
      }
    }

    function saveLocalFallbackData() {
      if (!state.dbConnected) {
        localStorage.setItem('junina_local_items', JSON.stringify(state.items));
        localStorage.setItem('junina_local_tx', JSON.stringify(state.transactions));
      }
    }

    window.showAlert = function(text, type = 'info') {
      state.alertMessage = { text, type };
      render();
      setTimeout(() => {
        state.alertMessage = null;
        render();
      }, 5000);
    };

    window.setActiveTab = function(tab) {
      state.activeTab = tab;
      render();
    };

    window.setPaymentMethod = function(method) {
      state.paymentMethod = method;
      render();
    };

    window.selectTempRole = function(role) {
      state.tempRole = role;
      render();
    };

    window.handleChangeRole = function() {
      state.tempSellerName = state.sellerName;
      state.tempRole = state.operatorRole;
      state.isSettingName = true;
      render();
    };

    window.handleSaveOperator = function(e) {
      if (e) e.preventDefault();
      const inputName = document.getElementById('inputSellerName').value.trim();
      if (!inputName) {
        window.showAlert("Por favor, digite seu nome ou o nome da sua barraca!", "warning");
        return;
      }

      state.sellerName = inputName;
      state.operatorRole = state.tempRole;
      state.isSettingName = false;

      localStorage.setItem('junina_seller_name', inputName);
      localStorage.setItem('junina_role', state.tempRole);

      if (state.operatorRole === 'CAIXA') {
        state.activeTab = 'vender_fichas';
      } else if (state.operatorRole === 'BARRACA') {
        state.activeTab = 'entregar_produtos';
      } else {
        state.activeTab = 'painel';
      }

      window.showAlert(`Perfil definido: ${inputName}! 🤠`, "success");
      render();
    };

    window.handleSellTokens = async function(type, qty) {
      if (!state.sellerName) {
        state.isSettingName = true;
        render();
        return;
      }

      const q = parseInt(qty);
      if (q <= 0 || isNaN(q)) {
        window.showAlert("Quantidade inválida!", "error");
        return;
      }

      const priceUnit = type === 'Comum' ? 5.00 : 7.50;
      const totalValue = priceUnit * q;

      const newTx = {
        id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 9),
        type: 'VENDA_FICHA',
        tokenType: type,
        qty: q,
        price: priceUnit,
        total: totalValue,
        paymentMethod: state.paymentMethod,
        sellerName: state.sellerName,
        timestamp: state.dbConnected ? null : Math.floor(Date.now() / 1000)
      };

      if (state.dbConnected) {
        try {
          const transColRef = collection(db, 'artifacts', state.appId, 'public', 'data', 'transactions');
          await addDoc(transColRef, {
            ...newTx,
            timestamp: serverTimestamp()
          });
        } catch(e) {
          window.showAlert("Erro ao registrar no banco.", "error");
        }
      } else {
        state.transactions.unshift(newTx);
        saveLocalFallbackData();
        render();
      }

      window.showAlert(`🎟️ Vendido: ${q}x Ficha ${type} (R$ ${totalValue.toFixed(2)})!`, "success");
    };

    window.handleDeliverProduct = async function(itemId, qtyToDeliver) {
      if (!state.sellerName) {
        state.isSettingName = true;
        render();
        return;
      }

      const itemIndex = state.items.findIndex(i => i.id === itemId);
      if (itemIndex === -1) return;

      const item = state.items[itemIndex];

      if (item.stock <= 0) {
        window.showAlert(`🚫 Estoque físico ESGOTADO para: ${item.name}!`, "error");
        return;
      }

      if (item.stock < qtyToDeliver) {
        window.showAlert(`⚠️ Apenas ${item.stock} unidades disponíveis no estoque!`, "warning");
        return;
      }

      const tokenTypeNeeded = parseFloat(item.price) === 7.50 ? 'Especial' : 'Comum';

      const newTx = {
        id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 9),
        type: 'ENTREGA_PRODUTO',
        itemId: item.id,
        itemName: item.name,
        qty: qtyToDeliver,
        tokenTypeUsed: tokenTypeNeeded,
        price: parseFloat(item.price),
        total: parseFloat(item.price) * qtyToDeliver,
        sellerName: state.sellerName,
        timestamp: state.dbConnected ? null : Math.floor(Date.now() / 1000)
      };

      if (state.dbConnected) {
        try {
          const itemDocRef = doc(db, 'artifacts', state.appId, 'public', 'data', 'items', item.id);
          const transColRef = collection(db, 'artifacts', state.appId, 'public', 'data', 'transactions');

          await updateDoc(itemDocRef, {
            stock: increment(-qtyToDeliver)
          });

          await addDoc(transColRef, {
            ...newTx,
            timestamp: serverTimestamp()
          });
        } catch(e) {
          window.showAlert("Erro ao dar baixa no servidor de estoque.", "error");
        }
      } else {
        item.stock -= qtyToDeliver;
        state.transactions.unshift(newTx);
        saveLocalFallbackData();
        render();
      }

      window.showAlert(`✅ Entrega feita! Baixa de ${qtyToDeliver}x "${item.name}" registrada.`, "success");
    };

    window.handleAddNewItem = async function(e) {
      if (e) e.preventDefault();
      const name = document.getElementById('newItemName').value.trim();
      const price = parseFloat(document.getElementById('newItemPrice').value);
      const stock = parseInt(document.getElementById('newItemStock').value);
      const category = document.getElementById('newItemCategory').value;

      if (!name || isNaN(price) || isNaN(stock) || stock < 0) {
        window.showAlert("Preencha todos os campos corretamente!", "warning");
        return;
      }

      const newItem = {
        id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 9),
        name,
        price,
        stock,
        category
      };

      if (state.dbConnected) {
        try {
          const itemsColRef = collection(db, 'artifacts', state.appId, 'public', 'data', 'items');
          await setDoc(doc(itemsColRef, newItem.id), {
            ...newItem,
            createdAt: serverTimestamp()
          });
        } catch(e) {
          window.showAlert("Erro ao salvar o produto no servidor.", "error");
        }
      } else {
        state.items.push(newItem);
        state.items.sort((a, b) => a.name.localeCompare(b.name));
        saveLocalFallbackData();
        render();
      }

      window.showAlert(`🎉 "${name}" inserido no cardápio de baixas!`, "success");
      document.getElementById('newItemName').value = '';
      document.getElementById('newItemStock').value = '';
    };

    window.handleUpdateStockDirectly = async function(itemId, newStockValue, itemName) {
      const val = parseInt(newStockValue);
      if (isNaN(val) || val < 0) return;

      if (state.dbConnected) {
        try {
          const itemDocRef = doc(db, 'artifacts', state.appId, 'public', 'data', 'items', itemId);
          await updateDoc(itemDocRef, { stock: val });
        } catch(e) {
          window.showAlert("Erro ao atualizar o estoque no servidor.", "error");
        }
      } else {
        const item = state.items.find(i => i.id === itemId);
        if (item) {
          item.stock = val;
          saveLocalFallbackData();
          render();
        }
      }
      window.showAlert(`Estoque de "${itemName}" ajustado para ${val}.`, "info");
    };

    window.handleDeleteItem = function(itemId, itemName) {
      state.confirmDeleteData = { id: itemId, name: itemName };
      render();
    };

    window.closeDeleteModal = function() {
      state.confirmDeleteData = null;
      render();
    };

    window.executeDeleteItem = async function() {
      if (!state.confirmDeleteData) return;

      if (state.dbConnected) {
        try {
          const itemDocRef = doc(db, 'artifacts', state.appId, 'public', 'data', 'items', state.confirmDeleteData.id);
          await deleteDoc(itemDocRef);
        } catch(e) {
          window.showAlert("Erro ao excluir do servidor.", "error");
        }
      } else {
        state.items = state.items.filter(i => i.id !== state.confirmDeleteData.id);
        saveLocalFallbackData();
      }

      window.showAlert(`🗑️ "${state.confirmDeleteData.name}" removido do cardápio.`, "info");
      state.confirmDeleteData = null;
      render();
    };

    function render() {
      const appEl = document.getElementById('app');

      const totalFichasComunsVendidas = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Comum')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasEspeciaisVendidas = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.tokenType === 'Especial')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasComunsEntregues = state.transactions
        .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Comum')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const totalFichasEspeciaisEntregues = state.transactions
        .filter(t => t.type === 'ENTREGA_PRODUTO' && t.tokenTypeUsed === 'Especial')
        .reduce((sum, t) => sum + (t.qty || 0), 0);

      const revenueCaixa = state.transactions
        .filter(t => t.type === 'VENDA_FICHA')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentDinheiro = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Dinheiro')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentPIX = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'PIX')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const totalPaymentCartao = state.transactions
        .filter(t => t.type === 'VENDA_FICHA' && t.paymentMethod === 'Cartão')
        .reduce((sum, t) => sum + (t.total || 0), 0);

      const fichasComunsEmCirculacao = Math.max(0, totalFichasComunsVendidas - totalFichasComunsEntregues);
      const fichasEspeciaisEmCirculacao = Math.max(0, totalFichasEspeciaisVendidas - totalFichasEspeciaisEntregues);

      const lowStockItems = state.items.filter(item => item.stock > 0 && item.stock <= 5);
      const outOfStockItems = state.items.filter(item => item.stock === 0);

      appEl.innerHTML = `
        <!-- Header Festivo -->
        <div class="bg-gradient-to-r from-amber-600 via-orange-500 to-red-600 text-white relative overflow-hidden shadow-lg">
          <div class="absolute top-0 left-0 w-full flex justify-around opacity-40 select-none pointer-events-none text-lg">
            <span>🔺</span><span class="text-yellow-300">🔻</span>
            <span>🔺</span><span class="text-yellow-200">🔻</span>
            <span>🔺</span><span class="text-yellow-300">🔻</span>
            <span>🔺</span><span class="text-yellow-100">🔻</span>
            <span>🔺</span><span class="text-yellow-300">🔻</span>
          </div>
          
          <div class="max-w-4xl mx-auto px-4 py-5 text-center relative z-10">
            <div class="flex items-center justify-center gap-2 mb-1">
              <span class="text-2xl animate-bounce">🔥</span>
              <h1 class="text-xl md:text-3xl font-extrabold tracking-tight font-serif text-yellow-300 drop-shadow-md">
                ARRAIAL DA FAVINHO
              </h1>
              <span class="text-2xl animate-bounce">🌽</span>
            </div>
            <p class="text-[10px] md:text-xs text-orange-100 font-bold tracking-widest uppercase">
              Caixa unificado de fichas & Baixa Simultânea de Estoque
            </p>
          </div>
        </div>

        <!-- Connection and Status Bar -->
        <div class="bg-amber-100 border-b border-amber-200 py-1.5 px-4 text-[11px]">
          <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-slate-600">
            <div class="flex items-center gap-2 font-medium">
              <span class="relative flex h-2 w-2">
                <span class="relative inline-flex rounded-full h-2 w-2 ${state.dbConnected ? 'bg-emerald-500' : 'bg-red-500 animate-pulse'}"></span>
              </span>
              <span>
                ${state.dbConnected 
                  ? '📶 Sincronização em Tempo Real Ativa (Conectado ao Firebase!)' 
                  : '⚠️ Conectando ao Banco...'}
              </span>
            </div>
            
            <div class="flex items-center gap-2">
              ${state.sellerName ? `
                <button 
                  onclick="handleChangeRole()"
                  class="flex items-center gap-1 bg-white px-2 py-0.5 rounded text-slate-700 font-bold shadow-xs hover:bg-slate-50 transition"
                >
                  <i data-lucide="users" class="w-3 h-3 text-orange-600"></i>
                  <span>Operador: <strong class="text-orange-700">${state.sellerName}</strong></span>
                </button>
              ` : ''}
            </div>
          </div>
        </div>

        <!-- Pop-up Alerts -->
        ${state.alertMessage ? `
          <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-sm shadow-2xl rounded-2xl overflow-hidden">
            <div class="p-4 flex items-center justify-between text-white font-bold ${
              state.alertMessage.type === 'success' ? 'bg-emerald-600' :
              state.alertMessage.type === 'error' ? 'bg-red-600' :
              state.alertMessage.type === 'warning' ? 'bg-amber-500' : 'bg-blue-600'
            }">
              <div class="flex items-center gap-2">
                <span class="text-xs md:text-sm">${state.alertMessage.text}</span>
              </div>
            </div>
          </div>
        ` : ''}

        <!-- Delete Item Confirm Modal -->
        ${state.confirmDeleteData ? `
          <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-red-500">
              <h3 class="text-base font-bold text-slate-900 flex items-center gap-2">
                ⚠️ Confirmar Remoção
              </h3>
              <p class="text-xs text-slate-600 mt-2">
                Deseja mesmo remover o item <strong>"${state.confirmDeleteData.name}"</strong>? O produto sairá do estoque das barracas.
              </p>
              <div class="mt-4 flex gap-2 justify-end text-xs">
                <button onclick="closeDeleteModal()" class="px-3 py-1.5 font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg">Voltar</button>
                <button onclick="executeDeleteItem()" class="px-3 py-1.5 font-bold bg-red-600 hover:bg-red-700 text-white rounded-lg">Deletar Item</button>
              </div>
            </div>
          </div>
        ` : ''}

        <main class="max-w-4xl mx-auto px-3 py-4">

          <!-- Initial Operator Selection Overlap -->
          ${state.isSettingName ? `
            <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-40 flex items-center justify-center p-4">
              <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl border-2 border-amber-500">
                <div class="text-center mb-3">
                  <span class="text-3xl block mb-1">🤠</span>
                  <h3 class="text-lg font-black text-slate-800">Selecione seu Perfil</h3>
                  <p class="text-[11px] text-slate-500 mt-0.5">
                    Os caixas vendem as fichas físicas (Comum/Especial). As barracas recolhem as fichas e dão as baixas correspondentes nos produtos!
                  </p>
                </div>
                <form onsubmit="handleSaveOperator(event)" class="space-y-3 text-xs">
                  <div>
                    <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Seu Nome ou Barraca</label>
                    <input
                      id="inputSellerName"
                      type="text"
                      placeholder="Ex: Pedro Caixa, Barraca Espetinho..."
                      value="${state.tempSellerName}"
                      class="w-full px-3 py-2 border-2 border-amber-200 rounded-xl focus:outline-none focus:border-orange-500 text-center text-sm font-bold"
                      maxlength="20"
                      required
                    />
                  </div>

                  <div>
                    <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Sua Função neste Evento</label>
                    <div class="grid grid-cols-3 gap-1.5">
                      <button
                        type="button"
                        onclick="selectTempRole('CAIXA')"
                        class="p-2 rounded-xl text-center border-2 flex flex-col items-center justify-center gap-1 transition ${
                          state.tempRole === 'CAIXA' 
                            ? 'border-orange-500 bg-orange-50 text-orange-700 font-extrabold' 
                            : 'border-slate-100 bg-slate-50 text-slate-600 hover:bg-slate-100'
                        }"
                      >
                        <i data-lucide="dollar-sign" class="w-3.5 h-3.5"></i>
                        <span class="text-[9px]">Vende Ficha</span>

                            ${isSale ? `🎟️ Venda: ${tx.qty}x Ficha ${tx.tokenType}` : `🍿 Baixa: ${tx.qty}x ${tx.itemName}`}
                          </p>
                          <p class="text-[9px] text-slate-400">
                            Registrado por: ${tx.sellerName} • ${timeString}
                          </p>
                        </div>
                        <span class="font-bold">R$ ${tx.total.toFixed(2)}</span>
                      </div>
                    `;
                  }).join('')}
                </div>
              `}
            </div>
          ` : ''}

        </main>

        <!-- Footer -->
        <footer class="text-center py-6 text-[10px] text-slate-400 border-t border-amber-100 mt-6 max-w-4xl mx-auto px-4">
          <p class="font-bold text-slate-500">🌽 Olha a Sila! É verdade! 🌽</p>
          <p class="mt-1">Sistema simples, veloz e integrado em tempo real no seu Firebase.</p>
        </footer>
      `;

      // Recria ícones do Lucide reativamente
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    // Inicialização da conexão
    tryConnectFirebase();
  </script>
</body>
</html>
